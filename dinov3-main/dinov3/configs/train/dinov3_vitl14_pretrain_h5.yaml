# Configuration for Self-Supervised Pre-training of ViT-Large on H5 Dataset

MODEL:
  META_ARCHITECTURE: SSLMetaArch
  DEVICE: cuda
  WEIGHTS: '' # No initial weights for pre-training
  DTYPE: float32

compute_precision:
  param_dtype: bf16       # Use BF16 for memory efficiency
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP # FSDP Strategy

dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  head_n_prototypes: 65536 # Standard prototype count for large models
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 2048
  koleo_loss_weight: 0.1
  koleo_loss_distributed: false
  koleo_topk: 1
  force_weight_norm: false

ibot:
  loss_weight: 1.0
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.5
  mask_random_circular_shift: false
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 65536
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 2048

gram:
  use_loss: false
  compute_stats: false

train:
  batch_size_per_gpu: 32  # Adjust based on GPU memory (ViT-L is heavy)
  dataset_path: "H5Dataset:root=/mnt/data/h5_data:split=TRAIN"
  h5_key: null            # Key in H5 file containing image data. Set to null for auto-detect.
  saveckp_freq: 10        # Save checkpoint every 10 epochs
  seed: 42
  num_workers: 8
  OFFICIAL_EPOCH_LENGTH: 1000 # Steps per epoch
  monitor_gradient_norm: false
  chunk_schedule: []
  cache_dataset: false    # Disable caching for large H5 files to avoid OOM
  use_teacher_head: true
  learn_from_teacher_tokens: false
  centering: sinkhorn_knopp
  checkpointing: true
  checkpointing_full: false
  compile: true           # Enable torch.compile for speed
  cudagraphs: false
  cell_augmentation: false
  sharded_eval_checkpoint: true

student:
  arch: vit_large         # <--- ViT-Large Architecture
  patch_size: 14          # <--- Patch Size 14 (or 16)
  drop_path_rate: 0.4     # Stochastic Depth for regularization
  layerscale: 1.0e-05
  patch_drop: 0.0
  pretrained_weights: ''  # Empty for pre-training from scratch
  ffn_layer: swiglu64
  ffn_ratio: 3
  resume_from_teacher_chkpt: ''
  qkv_bias: false
  proj_bias: true
  ffn_bias: true
  norm_layer: layernormbf16
  n_storage_tokens: 4
  untie_cls_and_patch_norms: false
  untie_global_and_local_cls_norm: true
  mask_k_bias: true
  in_chans: 3
  pos_embed_type: rope    # Rotary Positional Embeddings
  pos_embed_rope_base: 100
  pos_embed_rope_min_period: null
  pos_embed_rope_max_period: null
  pos_embed_rope_normalize_coords: separate
  pos_embed_rope_shift_coords: null
  pos_embed_rope_jitter_coords: null
  pos_embed_rope_rescale_coords: 2
  pos_embed_rope_dtype: fp32
  fp8_enabled: false      # Disable FP8 for stability unless tested
  fp8_filter: blocks

teacher:
  momentum_teacher: 0.994
  final_momentum_teacher: 0.994
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 100
  in_chans: 3

distillation:
  enabled: false

multidistillation:
  enabled: false

hrft:
  enabled: false

optim:
  epochs: 100             # Total training epochs
  optimizer: adamw
  weight_decay: 0.04
  weight_decay_end: 0.04
  lr: 5.0e-05             # Base Learning Rate
  warmup_epochs: 100      # Long warmup for stability
  min_lr: 1.0e-06
  schedule_trunc_extra: null
  clip_grad: 3.0          # Gradient Clipping
  freeze_last_layer_epochs: 5 # Freeze last layer for first 5 epochs
  scaling_rule: sqrt_wrt_1024 # LR scales with sqrt(batch_size / 1024)
  patch_embed_lr_mult: 0.2 # Lower LR for patch embedding
  dino_head_wd_multiplier: 1.0
  layerwise_decay: 0.98   # Layer-wise LR Decay
  multi_tensor_optim: true
  dump_fsdp_weights_path: ''
  adamw_beta1: 0.9
  adamw_beta2: 0.999

crops:
  global_crops_scale:
    - 0.32
    - 1.0
  local_crops_number: 8
  local_crops_scale:
    - 0.05
    - 0.32
  global_crops_size: 224  # Input size for ViT-L
  local_crops_size: 96
  localcrops_subset_of_globalcrops: false
  share_color_jitter: false
  horizontal_flips: true  # Enable horizontal flip for augmentation
  rgb_mean:
    - 0.485
    - 0.456
    - 0.406
  rgb_std:
    - 0.229
    - 0.224
    - 0.225

checkpointing:
  period: 10
  max_to_keep: 5
  keep_every: 50

schedules:
  lr:
    start: 0
    peak: 5.0e-05
    end: 1.0e-06
    warmup_epochs: 100
    freeze_last_layer_epochs: 5
  weight_decay:
    start: 0.04
    peak: 0.04
    end: 0.04
    warmup_epochs: 0
  teacher_temp:
    start: 0.04
    peak: 0.07
    end: 0.07
    warmup_epochs: 100
  momentum:
    start: 0.994
    peak: 0.994
    end: 0.994
    warmup_epochs: 0